<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>♻️ Eco Garbage Shooter — Play</title>
  <meta name="description" content="Trash Sort — click to pick up and drop trash into the correct bin. Score points, level up, and survive with 3 lives." />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Eco Garbage Shooter — Play" />
  <meta property="og:description" content="Click to pick up and drop trash into the correct bin. Score points, level up, and survive with 3 lives." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Eco Garbage Shooter — Play" />
  <meta name="twitter:description" content="Click to pick up and drop trash into the correct bin. Score points, level up, and survive with 3 lives." />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="game-body">

  <div id="root">
    <div class="game-root">
      <div class="game-container">
        <div class="hud">
          <div class="hud-item">
            <span class="hud-label">SCORE</span>
            <span class="hud-value" id="score">0</span>
          </div>
          <div class="hud-title">♻️ TRASH SORT</div>
          <div class="hud-item">
            <span class="hud-label">LEVEL</span>
            <span class="hud-value" id="level">1</span>
          </div>
        </div>

        <div class="sub-hud">
          <div class="lives-row" aria-label="Lives">
            <span class="life-heart life-active" id="life-1">♥</span>
            <span class="life-heart life-active" id="life-2">♥</span>
            <span class="life-heart life-active" id="life-3">♥</span>
          </div>
          <div class="sub-right">
            <span class="aim-row">CLICK to pick up · DROP in correct bin</span>
          </div>
        </div>

        <!-- Home button -->
        <a class="home-btn" href="../index.html">🏠 Home</a>
        <button class="reset-btn" id="reset-btn" type="button" title="Reset">↻ Reset</button>

        <!-- Hit / miss feedback flash -->
        <div id="feedback"></div>

        <!-- Canvas -->
        <canvas id="game" width="900" height="530" class="game-canvas"></canvas>

        <div class="bins">
          <div class="bin bin-plastic" data-bin="plastic">
            <div class="bin-emoji">🧴</div>
            <div class="bin-label">PLASTIC</div>
          </div>
          <div class="bin bin-paper" data-bin="paper">
            <div class="bin-emoji">📄</div>
            <div class="bin-label">PAPER</div>
          </div>
          <div class="bin bin-organic" data-bin="organic">
            <div class="bin-emoji">🍌</div>
            <div class="bin-label">ORGANIC</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/game.js"></script>
</body>
</html>
