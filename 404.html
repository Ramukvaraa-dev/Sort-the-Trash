<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Trash Lost</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      background:radial-gradient(circle at 10% 10%, rgba(46,204,113,0.08), transparent 10%),
                  linear-gradient(180deg,#07120a 0%, #0d2612 40%, #092014 100%);
      overflow:hidden;
      color:var(--text, #e6f7e6);
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      -webkit-font-smoothing:antialiased;
    }

    .floating-trash{
      position:absolute;
      font-size:2.2rem;
      opacity:0.12;
      animation:float linear infinite;
      user-select:none;
      filter:drop-shadow(0 6px 12px rgba(0,0,0,0.6));
      transform-origin:center;
    }

    @keyframes float{
      from{
        transform:translateY(110vh) rotate(0deg);
      }
      to{
        transform:translateY(-120vh) rotate(360deg);
      }
    }

    .container{
      text-align:center;
      padding:36px;
      width:92%;
      max-width:880px;
      background:linear-gradient(180deg, rgba(12,30,12,0.6), rgba(6,18,9,0.5));
      border:1px solid rgba(34,197,94,0.12);
      backdrop-filter: blur(8px) saturate(120%);
      border-radius:18px;
      box-shadow:0 10px 40px rgba(3,6,4,0.7), inset 0 1px 0 rgba(255,255,255,0.02);
      z-index:10;
    }

    h1{
      font-size:7rem;
      color:#7cff91;
      text-shadow:0 6px 30px rgba(60,220,120,0.18);
      letter-spacing:4px;
      margin-bottom:6px;
    }

    h2{
      font-size:1.6rem;
      margin-bottom:14px;
      font-weight:500;
      color: #dfffe0;
      opacity:0.95;
    }

    p{
      font-size:1.05rem;
      color:#cfeed1;
      margin-bottom:22px;
      line-height:1.6;
      opacity:0.95;
    }

    .bins{
      display:flex;
      justify-content:center;
      gap:20px;
      margin:30px 0;
      flex-wrap:wrap;
    }

    .bin{
      width:140px;
      height:150px;
      border-radius:14px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      font-size:1.05rem;
      font-weight:600;
      transition:0.25s ease;
      cursor:pointer;
      border:1px solid rgba(255,255,255,0.04);
      box-shadow: 0 8px 20px rgba(2,6,2,0.45);
      color: #04170a;
    }

    .bin:hover{
      transform:translateY(-8px) scale(1.05);
    }

    .recycle{
      background:linear-gradient(180deg,#2f9e44,#1f7f32);
    }

    .organic{
      background:linear-gradient(180deg,#9b6f52,#7a5238);
    }

    .plastic{
      background:linear-gradient(180deg,#1e85c9,#145f96);
    }

    .emoji{
      font-size:2.6rem;
      margin-bottom:8px;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.45));
    }

    .btn{
      display:inline-block;
      margin-top:18px;
      padding:12px 26px;
      background:linear-gradient(90deg,#6ef07a,#9eff7a);
      color:#04210a;
      text-decoration:none;
      border-radius:12px;
      font-weight:700;
      transition:0.18s ease;
      box-shadow:0 10px 30px rgba(46,204,113,0.12), inset 0 -2px 0 rgba(0,0,0,0.06);
    }

    .btn:hover{
      transform:translateY(-4px) scale(1.02);
      box-shadow:0 18px 40px rgba(46,204,113,0.16);
      opacity:0.98;
    }

    .tip{
      margin-top:20px;
      font-size:0.92rem;
      opacity:0.85;
      color:#cfeed1;
    }

    @media(max-width:700px){
      h1{ font-size:5rem; }
      h2{ font-size:1.3rem; }
      .bin{ width:110px; height:120px; }
    }
  </style>
</head>
<body>

  <!-- Floating Trash -->
  <div class="floating-trash" style="left:5%; animation-duration:12s;">🧃</div>
  <div class="floating-trash" style="left:18%; animation-duration:18s;">🍌</div>
  <div class="floating-trash" style="left:30%; animation-duration:10s;">📰</div>
  <div class="floating-trash" style="left:48%; animation-duration:16s;">🥤</div>
  <div class="floating-trash" style="left:62%; animation-duration:13s;">🍕</div>
  <div class="floating-trash" style="left:77%; animation-duration:19s;">🛍️</div>
  <div class="floating-trash" style="left:90%; animation-duration:11s;">🧴</div>

  <div class="container">
    <h1>404</h1>
    <h2>Oops. This trash escaped the sorting center.</h2>

    <p>
      The page you tried to reach got mixed into the wrong bin 💀<br>
      Maybe recycle your path and try again.
    </p>

    <div class="bins">

      <div class="bin recycle">
        <div class="emoji">♻️</div>
        Recycle
      </div>

      <div class="bin organic">
        <div class="emoji">🍂</div>
        Organic
      </div>

      <div class="bin plastic">
        <div class="emoji">🧴</div>
        Plastic
      </div>

    </div>

    <a href="./index.html" class="btn">Return Home</a>

    <div class="tip">
      Pro Tip: Sort your trash. Save the planet 🌍
    </div>
  </div>

</body>
</html>
