<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>♻️ Sort the Trash — Play</title>
  <meta name="description" content="Trash Sort — drag each item along its curved path into the matching column." />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Sort the Trash — Play" />
  <meta property="og:description" content="Drag each item along its curved path into the matching column." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sort the Trash — Play" />
  <meta name="twitter:description" content="Drag each item along its curved path into the matching column." />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="game-body">

  <div id="root">
    <div class="game-root">
      <div class="game-container">
        <div class="hud">
          <div class="hud-item">
            <span class="hud-label">SCORE</span>
            <span class="hud-value" id="score"><span id="score-value">0</span></span>
          </div>
          <div class="hud-title">♻️ TRASH SORT</div>
          <div class="hud-item">
            <span class="hud-label">LEVEL</span>
            <span class="hud-value" id="level">1</span>
          </div>
        </div>

        <div class="sub-hud">
          <div class="lives-row" aria-label="Lives">
            <span class="life-heart life-active" id="life-1">♥</span>
            <span class="life-heart life-active" id="life-2">♥</span>
            <span class="life-heart life-active" id="life-3">♥</span>
          </div>
          <div class="sub-right">
            <span class="aim-row">Drag each trash piece along its curved route into the matching column. There will be no extra time given. If it misses, you lose a life.</span>
          </div>
        </div>

        <div class="action-row">
          <a class="home-btn" href="../index.html">🏠 Home</a>
          <button class="reset-btn" id="reset-btn" type="button" title="Reset">↻ Reset</button>
        </div>

        <div class="game-stage">
          <div id="feedback"></div>
          <canvas id="game" width="900" height="530" class="game-canvas"></canvas>
        </div>

        <div class="bins">
          <div class="bin bin-plastic" data-bin="plastic">
            <div class="bin-emoji">🧴</div>
            <div class="bin-label">PLASTIC</div>
          </div>
          <div class="bin bin-paper" data-bin="paper">
            <div class="bin-emoji">📄</div>
            <div class="bin-label">PAPER</div>
          </div>
          <div class="bin bin-organic" data-bin="organic">
            <div class="bin-emoji">🍌</div>
            <div class="bin-label">ORGANIC</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/game.js"></script>
  <script>
    const scoreElement = document.getElementById('score-value');
    if (scoreElement) {
      let lastScore = Number.parseInt(scoreElement.textContent, 10) || 0;
      const observer = new MutationObserver(() => {
        const currentScore = Number.parseInt(scoreElement.textContent, 10);
        if (!Number.isFinite(currentScore)) {
          return;
        }
        if (currentScore > lastScore) {
          const delta = currentScore - lastScore;
          if (delta === 1) {
            const adjustedScore = lastScore + 5;
            scoreElement.textContent = adjustedScore;
            lastScore = adjustedScore;
          } else {
            lastScore = currentScore;
          }
        } else {
          lastScore = currentScore;
        }
      });
      observer.observe(scoreElement, { characterData: true, childList: true, subtree: true });
    }
  </script>
</body>
</html>
